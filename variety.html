<!DOCTYPE html>

<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuu sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial, sans-serif;
background:#f3f6f2;
margin:0;
padding:30px;
color:#333;
transition:background 0.3s, color 0.3s;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
transition:background 0.3s;
}

h1{
margin-top:0;
}

.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.gallery img{
width:180px;
height:180px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:15px;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#2e7d32;
font-weight:bold;
}

.back:hover{
text-decoration:underline;
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
body{
background:#121212;
color:#e0e0e0;
}

.container{
background:#1e1e1e;
}

a{
color:#81c784;
}
}
</style>

</head>

<body>

<a class="back" href="catalogue.html">← Tagasi kataloogi</a>

<div class="container">
<h1 id="name"></h1>

<div class="gallery" id="gallery"></div>

<p id="description"></p>

<div class="info-grid">
<div><b>Varasus:</b> <span id="varasus"></span></div>
<div><b>Maitsev:</b> <span id="maitsev"></span></div>
<div><b>Suurus:</b> <span id="suurus"></span></div>
<div><b>Külmakindlus:</b> <span id="kulmakindlus"></span></div>
<div><b>Värvus:</b> <span id="varvus"></span></div>
<div><b>Breba:</b> <span id="breba"></span></div>
<div><b>Riik:</b> <span id="riik"></span></div>
<div><b>Kandnud:</b> <span id="kandnud"></span></div>
<div><b>Saadavus:</b> <span id="saadavus"></span></div>
</div>

</div>

<script>
function getIdFromUrl(){
const params=new URLSearchParams(window.location.search)
return params.get("id")
}

fetch("figs2.json")
.then(res=>res.json())
.then(data=>{

const id=getIdFromUrl()
const fig=data.find(f=>f.id===id)
if(!fig) return

document.getElementById("name").innerText=fig.name
document.getElementById("description").innerText=fig.kirjeldus || ""

document.getElementById("varasus").innerText=fig.varasus || ""
document.getElementById("maitsev").innerText=fig.maitsev || ""
document.getElementById("suurus").innerText=fig.suurus || ""
document.getElementById("kulmakindlus").innerText=fig.kulmakindlus || ""
document.getElementById("varvus").innerText=fig.varvus || ""
document.getElementById("breba").innerText=fig.breba || ""
document.getElementById("riik").innerText=fig.riik || ""
document.getElementById("kandnud").innerText=fig.kandnud || ""
document.getElementById("saadavus").innerText=fig.saadavus || ""

const gallery=document.getElementById("gallery")

if(fig.images){
fig.images.forEach(img=>{
const image=document.createElement("img")
image.src=img.replace("../","")
image.onclick=()=>window.open(image.src)
gallery.appendChild(image)
})
}

})
</script>

</body>
</html>
