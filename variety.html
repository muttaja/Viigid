<!DOCTYPE html>

<html lang="et">
<head>

<meta charset="UTF-8">
<title>Viigipuu sort</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f3f6f2;
margin:0;
padding:20px;
color:#333;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

img{
width:100%;
max-height:420px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
}

td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

td:first-child{
font-weight:bold;
width:40%;
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#2e7d32;
color:white;
text-decoration:none;
border-radius:6px;
}

.back:hover{
background:#1b5e20;
}

.desc{
margin:10px 0 15px 0;
font-size:16px;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:6px;
font-size:14px;
color:white;
margin-bottom:10px;
}

.available{
background:#2e7d32;
}

.unavailable{
background:#888;
}

</style>

</head>

<body>

<div class="container" id="varietyContainer">
Laen...
</div>

<script>

function getNameFromURL(){
const params = new URLSearchParams(window.location.search)
return params.get("name")
}

fetch("figs2.json")
.then(res => res.json())
.then(data => {

const name = getNameFromURL()
const fig = data.find(f => f.name === name)

if(!fig){
document.getElementById("varietyContainer").innerHTML = "Sorti ei leitud"
return
}

let imageHTML = fig.image ? `<img src="${fig.image}">` : ""
let descHTML = fig.kirjeldus ? `<p class="desc"><b>Kirjeldus:</b> ${fig.kirjeldus}</p>` : ""

let badgeHTML = fig.saadavus === "jah"
? `<div class="badge available">Saadaval</div>`
: `<div class="badge unavailable">Pole saadaval</div>`

document.getElementById("varietyContainer").innerHTML = `
<h1>${fig.name}</h1>

${badgeHTML}
${imageHTML}
${descHTML}

<table>
<tr><td>Varasus</td><td>${fig.varasus}</td></tr>
<tr><td>Maitsev</td><td>${fig.maitsev}</td></tr>
<tr><td>Suurus</td><td>${fig.suurus}</td></tr>
<tr><td>Külmakindlus</td><td>${fig.kulmakindlus}</td></tr>
<tr><td>Värvus</td><td>${fig.varvus}</td></tr>
<tr><td>Breba</td><td>${fig.breba}</td></tr>
<tr><td>Riik</td><td>${fig.riik}</td></tr>
<tr><td>Saadavus</td><td>${fig.saadavus}</td></tr>
</table>

<a class="back" href="catalog.html">← Tagasi kataloogi</a>
`
})

</script>

</body>
</html>
