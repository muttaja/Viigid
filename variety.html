<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

h1{
    margin-top:0;
}

.variety-img{
    width:100%;
    margin-top:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

.variety-img:hover{
    transform:scale(1.02);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

td{
    padding:8px;
    border-bottom:1px solid rgba(0,0,0,0.1);
}

.back{
    display:inline-block;
    margin-top:15px;
    color:var(--green);
    text-decoration:none;
    font-weight:bold;
}

/* IMAGE MODAL */
.modal{
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}

.modal img{
    display:block;
    max-width:95%;
    max-height:95%;
    margin:auto;
    margin-top:2%;
}

.modal.close{
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1 id="title"></h1>
<p><b>Kirjeldus:</b> <span id="kirjeldus"></span></p>

<div id="images"></div>

<table id="info"></table>

<a class="back" href="catalogue.html">← Tagasi kataloogi</a>

</div>
</div>

<!-- IMAGE MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>
async function loadVariety(){
    const params = new URLSearchParams(window.location.search)
    const id = params.get("id")

    const res = await fetch("figs.json")
    const data = await res.json()

    const f = data.find(x => x.id === id)
    if(!f) return

    document.getElementById("title").innerText =
        f.name + (f.saadavus=="jah" ? " (saadaval)" : "")

    document.getElementById("kirjeldus").innerText =
        f.kirjeldus || ""

    document.getElementById("info").innerHTML = `
        <tr><td>Varasus</td><td>${f.varasus || ""}</td></tr>
        <tr><td>Maitsev</td><td>${f.maitsev || ""}</td></tr>
        <tr><td>Suurus</td><td>${f.suurus || ""}</td></tr>
        <tr><td>Külmakindlus</td><td>${f.kulmakindlus || ""}</td></tr>
        <tr><td>Värvus</td><td>${f.varvus || ""}</td></tr>
        <tr><td>Breba</td><td>${f.breba || ""}</td></tr>
        <tr><td>Riik</td><td>${f.riik || ""}</td></tr>
        <tr><td>Kandnud</td><td>${f.kandnud || ""}</td></tr>
    `

    // LOAD ALL IMAGES
    let html = ""
    if(f.images){
        for(const img of f.images){
            const imgPath = img.replace("../","")
            html += `<img src="${imgPath}" class="variety-img" onclick="openModal('${imgPath}')">`
        }
    }

    document.getElementById("images").innerHTML = html
}

function openModal(src){
    document.getElementById("modal").style.display="block"
    document.getElementById("modalImg").src = src
}

function closeModal(){
    document.getElementById("modal").style.display="none"
}

loadVariety()
</script>

</body>
</html>
