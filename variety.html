<!DOCTYPE html>
<html lang="et">
<head>

<meta charset="UTF-8">
<title>Viigipuu sort</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f3f6f2;
margin:0;
padding:40px;
text-align:center;
}

.card{
max-width:750px;
margin:auto;
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
overflow:hidden;
}

.card img{
width:100%;
height:auto;
}

.card-body{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

.back{
display:inline-block;
margin-top:25px;
padding:12px 22px;
background:#2e7d32;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="card">

<img id="figImage">

<div class="card-body">

<h1 id="figName"></h1>

<table>

<p><b>Kirjeldus:</b> ${fig.kirjeldus}</p>

<tr><td>Varasus</td><td id="varasus"></td></tr>
<tr><td>Maitsev</td><td id="maitsev"></td></tr>
<tr><td>Suurus</td><td id="suurus"></td></tr>
<tr><td>Külmakindlus</td><td id="kulmakindlus"></td></tr>
<tr><td>Värvus</td><td id="varvus"></td></tr>
<tr><td>Breba</td><td id="breba"></td></tr>
<tr><td>Riik</td><td id="riik"></td></tr>
<tr><td>Saadavus</td><td id="saadavus"></td></tr>

</table>

<a class="back" href="https://ficus.ee">← tagasi</a>

</div>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const name = params.get("name")

fetch("figs.json")
.then(res => res.json())
.then(data => {

const fig = data.find(f => f.name === name)

if(!fig){
document.getElementById("figName").innerText = "Sorti ei leitud"
return
}

document.title = fig.name + " – viigipuu"

document.getElementById("figName").innerText = fig.name
document.getElementById("figImage").src = fig.image

document.getElementById("varasus").innerText = fig.varasus
document.getElementById("maitsev").innerText = fig.maitsev
document.getElementById("suurus").innerText = fig.suurus
document.getElementById("kulmakindlus").innerText = fig.kulmakindlus
document.getElementById("varvus").innerText = fig.varvus
document.getElementById("breba").innerText = fig.breba
document.getElementById("riik").innerText = fig.riik
document.getElementById("saadavus").innerText = fig.saadavus

})

</script>

</body>
</html>
