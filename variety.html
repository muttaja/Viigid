<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sort – Ficus.ee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    padding:20px;
}

/* IMAGE SLIDER */
.image-slider{
    position:relative;
    margin-bottom:15px;
}

.image-frame{
    width:100%;
    height:420px;
    background:#00000015;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    overflow:hidden;
}

.image-frame img{
    max-width:100%;
    max-height:100%;
}

/* ARROWS */
.img-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:26px;
    padding:8px 14px;
    cursor:pointer;
    border-radius:6px;
}

.img-left{ left:10px; }
.img-right{ right:10px; }

/* DOTS */
.img-dots{
    text-align:center;
    margin-top:8px;
}

.img-dot{
    display:inline-block;
    width:8px;
    height:8px;
    margin:0 4px;
    background:#aaa;
    border-radius:50%;
}

.img-dot.active{
    background:#555;
}

/* FULLSCREEN */
.fullscreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.fullscreen img{
    max-width:95%;
    max-height:95%;
}

.close-full{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:30px;
    cursor:pointer;
}

/* INFO TABLE */
.info-grid{
    display:grid;
    grid-template-columns:150px 1fr;
    gap:8px;
    margin-top:15px;
    font-size:15px;
}

.back{
    display:inline-block;
    margin-top:20px;
    color:var(--green);
    text-decoration:none;
    font-weight:bold;
}

@media (max-width:700px){
.image-frame{
    height:260px;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card" id="varietyCard"></div>
</div>

<script>
let images = []
let currentImg = 0
let startX = 0

function getId(){
    const params = new URLSearchParams(window.location.search)
    return params.get("id")
}

/* LOAD IMAGES FROM FOLDER */
async function loadImages(folder){
    let list = []

    for(let i=1;i<=20;i++){
        const img = folder + i + ".jpg"
        try{
            const res = await fetch(img, {method:'HEAD'})
            if(res.ok){
                list.push(img)
            } else {
                break
            }
        }catch{
            break
        }
    }

    return list
}

async function loadVariety(){
    const id = getId()

    const res = await fetch("figs.json")
    const data = await res.json()

    const f = data.find(x => x.id === id)
    if(!f) return

    currentImg = 0

    // LOAD IMAGES FIRST
    if(f.images && f.images[0].endsWith("/")){
        images = await loadImages(f.images[0])
    } else {
        images = f.images || []
    }

    renderVariety(f)
}

function renderVariety(f){
    document.getElementById("varietyCard").innerHTML = `
        <h1>
            ${f.name}
            ${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval)</span>' : ''}
        </h1>

        <p>${f.kirjeldus || ""}</p>

        <div class="image-slider">
            ${images.length>1 ? '<button class="img-arrow img-left" onclick="prevImg()">‹</button>' : ''}
            ${images.length>1 ? '<button class="img-arrow img-right" onclick="nextImg()">›</button>' : ''}

            <div class="image-frame">
                <img id="varImg" src="${images[0] || ''}">
            </div>

            <div class="img-dots">
                ${images.map((_,i)=>`<span class="img-dot ${i==0?'active':''}"></span>`).join("")}
            </div>
        </div>

        <div class="info-grid">
            <div>Varasus</div><div>${f.varasus}</div>
            <div>Maitsev</div><div>${f.maitsev}</div>
            <div>Suurus</div><div>${f.suurus}</div>
            <div>Külmakindlus</div><div>${f.kulmakindlus}</div>
            <div>Värvus</div><div>${f.varvus}</div>
            <div>Breba</div><div>${f.breba}</div>
            <div>Riik</div><div>${f.riik}</div>
            <div>Kandnud</div><div>${f.kandnud}</div>
        </div>

        <a class="back" href="catalogue.html">← Tagasi kataloogi</a>
    `
}

/* IMAGE NAV */
function updateDots(){
    const dots = document.querySelectorAll(".img-dot")
    dots.forEach(d=>d.classList.remove("active"))
    if(dots[currentImg]) dots[currentImg].classList.add("active")
}

function nextImg(){
    if(images.length < 2) return
    currentImg = (currentImg + 1) % images.length
    document.getElementById("varImg").src = images[currentImg]
    updateDots()
}

function prevImg(){
    if(images.length < 2) return
    currentImg = (currentImg - 1 + images.length) % images.length
    document.getElementById("varImg").src = images[currentImg]
    updateDots()
}

/* SWIPE */
document.addEventListener("touchstart", e=>{
    if(e.target.closest(".image-frame")){
        startX = e.touches[0].clientX
    }
})

document.addEventListener("touchend", e=>{
    if(e.target.closest(".image-frame")){
        let endX = e.changedTouches[0].clientX
        if(endX - startX > 50) prevImg()
        if(startX - endX > 50) nextImg()
    }
})

loadVariety()
</script>
</body>
</html>
