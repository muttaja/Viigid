<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

h1{
    margin-top:0;
}

/* IMAGE SLIDER */
.image-slider{
    position:relative;
}

.image-slider img{
    width:100%;
    border-radius:12px;
    margin-top:15px;
    cursor:pointer;
}

.img-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:24px;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.img-left{ left:10px; }
.img-right{ right:10px; }

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

td{
    padding:8px;
    border-bottom:1px solid rgba(0,0,0,0.1);
}

.back{
    display:inline-block;
    margin-top:15px;
    color:var(--green);
    text-decoration:none;
    font-weight:bold;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}

.modal img{
    display:block;
    max-width:95%;
    max-height:95%;
    margin:auto;
    margin-top:2%;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1 id="title"></h1>
<p><b>Kirjeldus:</b> <span id="kirjeldus"></span></p>

<div id="images"></div>

<table id="info"></table>

<a class="back" href="catalogue.html">← Tagasi kataloogi</a>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>
let images = []
let currentImg = 0

async function loadVariety(){
    const params = new URLSearchParams(window.location.search)
    const id = params.get("id")

    const res = await fetch("figs.json")
    const data = await res.json()

    const f = data.find(x => x.id === id)
    if(!f) return

    document.getElementById("title").innerText =
        f.name + (f.saadavus=="jah" ? " (saadaval)" : "")

    document.getElementById("kirjeldus").innerText =
        f.kirjeldus || ""

    document.getElementById("info").innerHTML = `
        <tr><td>Varasus</td><td>${f.varasus || ""}</td></tr>
        <tr><td>Maitsev</td><td>${f.maitsev || ""}</td></tr>
        <tr><td>Suurus</td><td>${f.suurus || ""}</td></tr>
        <tr><td>Külmakindlus</td><td>${f.kulmakindlus || ""}</td></tr>
        <tr><td>Värvus</td><td>${f.varvus || ""}</td></tr>
        <tr><td>Breba</td><td>${f.breba || ""}</td></tr>
        <tr><td>Riik</td><td>${f.riik || ""}</td></tr>
        <tr><td>Kandnud</td><td>${f.kandnud || ""}</td></tr>
    `

    images = []
    if(f.images){
        for(const img of f.images){
            images.push(img.replace("../",""))
        }
    }

    renderImages()
}

function renderImages(){
    if(images.length == 0) return

    if(images.length == 1){
        document.getElementById("images").innerHTML =
            `<img src="${images[0]}" onclick="openModal('${images[0]}')">`
        return
    }

    document.getElementById("images").innerHTML = `
        <div class="image-slider">
            <button class="img-arrow img-left" onclick="prevImg()">‹</button>
            <img id="sliderImg" src="${images[0]}" onclick="openModal('${images[0]}')">
            <button class="img-arrow img-right" onclick="nextImg()">›</button>
        </div>
    `
}

function nextImg(){
    currentImg = (currentImg + 1) % images.length
    updateImg()
}

function prevImg(){
    currentImg = (currentImg - 1 + images.length) % images.length
    updateImg()
}

function updateImg(){
    const img = document.getElementById("sliderImg")
    img.src = images[currentImg]
    img.setAttribute("onclick", `openModal('${images[currentImg]}')`)
}

/* SWIPE */
let startX = 0

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX
})

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX
    if(endX - startX > 50) prevImg()
    if(startX - endX > 50) nextImg()
})

/* MODAL */
function openModal(src){
    document.getElementById("modal").style.display="block"
    document.getElementById("modalImg").src = src
}

function closeModal(){
    document.getElementById("modal").style.display="none"
}

loadVariety()
</script>

</body>
</html>
