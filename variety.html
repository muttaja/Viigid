<!DOCTYPE html>

<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuu sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f3f6f2;
margin:0;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:6px;
color:white;
font-size:14px;
margin-left:10px;
}

.available{ background:#2e7d32; }
.unavailable{ background:#999; }

.gallery{
margin-top:20px;
}

.gallery img{
width:100%;
max-height:450px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

td{
border-bottom:1px solid #eee;
padding:8px;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#2e7d32;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">
<div id="variety"></div>
<a class="back" href="catalogue.html">← Tagasi kataloogi</a>
</div>

<script>
function getId(){
const params=new URLSearchParams(window.location.search)
return params.get("id")
}

fetch("figs2.json")
.then(res=>res.json())
.then(data=>{
const id=getId()
const fig=data.find(f=>f.id===id)

if(!fig){
document.getElementById("variety").innerHTML="<h2>Sorti ei leitud</h2>"
return
}

let imagesHTML=""
if(fig.images){
fig.images.forEach(img=>{
imagesHTML+=`<img src="${img}">`
})
}

document.getElementById("variety").innerHTML=`
<h1>
${fig.name}
<span class="badge ${fig.saadavus=="jah"?"available":"unavailable"}">
${fig.saadavus=="jah"?"Saadaval":"Pole saadaval"}
</span>
</h1>

<p><b>Kirjeldus:</b> ${fig.kirjeldus || ""}</p>

<div class="gallery">
${imagesHTML}
</div>

<table>
<tr><td>Varasus</td><td>${fig.varasus}</td></tr>
<tr><td>Maitsev</td><td>${fig.maitsev}</td></tr>
<tr><td>Suurus</td><td>${fig.suurus}</td></tr>
<tr><td>Külmakindlus</td><td>${fig.kulmakindlus}</td></tr>
<tr><td>Värvus</td><td>${fig.varvus}</td></tr>
<tr><td>Breba</td><td>${fig.breba}</td></tr>
<tr><td>Riik</td><td>${fig.riik}</td></tr>
<tr><td>Kandnud</td><td>${fig.kandnud}</td></tr>
</table>
`
})
</script>

</body>
</html>
