<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sort – Ficus.ee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    padding:20px;
}

/* IMAGE SLIDER */
.image-slider{
    position:relative;
    margin-bottom:15px;
}

.image-frame{
    width:100%;
    height:420px;
    background:#00000015;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    overflow:hidden;
}

.image-frame img{
    max-width:100%;
    max-height:100%;
    cursor:pointer;
}

/* ARROWS */
.img-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:26px;
    padding:8px 14px;
    cursor:pointer;
    border-radius:6px;
}

.img-left{ left:10px; }
.img-right{ right:10px; }

/* DOTS */
.img-dots{
    text-align:center;
    margin-top:8px;
}

.img-dot{
    display:inline-block;
    width:8px;
    height:8px;
    margin:0 4px;
    background:#aaa;
    border-radius:50%;
    cursor:pointer;
}

.img-dot.active{
    background:#555;
}

/* FULLSCREEN */
.fullscreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.fullscreen img{
    max-width:95%;
    max-height:95%;
}

.close-full{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:30px;
    cursor:pointer;
}

/* INFO GRID */
.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:15px;
    font-size:15px;
}

.info-col div{
    margin-bottom:6px;
}

/* BUTTONS */
.buttons{
    margin-top:20px;
}

.btn{
    display:inline-block;
    padding:10px 16px;
    margin-right:10px;
    background:var(--green);
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

@media (max-width:700px){
.image-frame{
    height:260px;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card" id="varietyCard"></div>
</div>

<script>
let images = []
let currentImg = 0
let startX = 0
let startY = 0

function getId(){
    const params = new URLSearchParams(window.location.search)
    return params.get("id")
}

/* LOAD ONLY EXISTING IMAGES */
function loadImages(folder){
    return new Promise(resolve=>{
        let list = []
        let i = 1

        function check(){
            let img = new Image()
            let path = folder + i + ".jpg"

            img.onload = function(){
                list.push(path)
                i++
                check()
            }

            img.onerror = function(){
                resolve(list)
            }

            img.src = path
        }

        check()
    })
}

async function loadVariety(){
    const id = getId()

    const res = await fetch("figs.json")
    const data = await res.json()

    const f = data.find(x => x.id === id)
    if(!f) return

    if(f.images && f.images[0].endsWith("/")){
        images = await loadImages(f.images[0])
    } else {
        images = f.images || []
    }

    buildPage(f)
}

/* BUILD PAGE */
function buildPage(f){
    currentImg = 0
    const card = document.getElementById("varietyCard")

    card.innerHTML = `
        <h1>
            ${f.name}
            ${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval)</span>' : ''}
        </h1>

        <p>${f.kirjeldus || ""}</p>

        <div class="image-slider">
            ${images.length>1 ? '<button class="img-arrow img-left" id="prevBtn">‹</button>' : ''}
            ${images.length>1 ? '<button class="img-arrow img-right" id="nextBtn">›</button>' : ''}

            <div class="image-frame" id="imageFrame">
                <img id="varImg" src="${images[0] || ''}">
            </div>

            <div class="img-dots" id="dots"></div>
        </div>

        <div class="info-grid">
            <div class="info-col">
                <div><b>Varasus:</b> ${f.varasus}</div>
                <div><b>Suurus:</b> ${f.suurus}</div>
                <div><b>Värvus:</b> ${f.varvus}</div>
                <div><b>Maitsev:</b> ${f.maitsev}</div>
            </div>

            <div class="info-col">
                <div><b>Külmakindlus:</b> ${f.kulmakindlus}</div>
                <div><b>Breba:</b> ${f.breba}</div>
                <div><b>Riik:</b> ${f.riik}</div>
                <div><b>Saadavus:</b> ${f.saadavus}</div>
            </div>
        </div>

        <div class="buttons">
            <a class="btn" href="catalogue.html">← Tagasi kataloogi</a>
            <a class="btn" href="index.html">← Tagasi avalehele</a>
        </div>
    `

    setupSlider()
}

/* SLIDER */
function setupSlider(){
    const img = document.getElementById("varImg")
    const dotsDiv = document.getElementById("dots")

    dotsDiv.innerHTML = images.map((_,i)=>`<span class="img-dot" data-i="${i}"></span>`).join("")
    updateDots()

    if(document.getElementById("prevBtn")){
        document.getElementById("prevBtn").onclick = prevImg
        document.getElementById("nextBtn").onclick = nextImg
    }

    document.querySelectorAll(".img-dot").forEach(dot=>{
        dot.onclick = () => {
            currentImg = parseInt(dot.dataset.i)
            img.src = images[currentImg]
            updateDots()
        }
    })

    img.onclick = openFullscreen

    const frame = document.getElementById("imageFrame")

    frame.addEventListener("touchstart", e=>{
        startX = e.touches[0].clientX
        startY = e.touches[0].clientY
    })

    frame.addEventListener("touchend", e=>{
        let endX = e.changedTouches[0].clientX
        let endY = e.changedTouches[0].clientY

        let diffX = endX - startX
        let diffY = endY - startY

        if(Math.abs(diffX) > Math.abs(diffY)){
            if(diffX > 50) prevImg()
            if(diffX < -50) nextImg()
        }
    })
}

function nextImg(){
    if(currentImg < images.length-1){
        currentImg++
    } else {
        currentImg = 0
    }
    document.getElementById("varImg").src = images[currentImg]
    updateDots()
}

function prevImg(){
    if(currentImg > 0){
        currentImg--
    } else {
        currentImg = images.length-1
    }
    document.getElementById("varImg").src = images[currentImg]
    updateDots()
}

function updateDots(){
    const dots = document.querySelectorAll(".img-dot")
    dots.forEach(d=>d.classList.remove("active"))
    if(dots[currentImg]) dots[currentImg].classList.add("active")
}

/* FULLSCREEN */
function openFullscreen(){
    const div = document.createElement("div")
    div.className = "fullscreen"
    div.innerHTML = `
        <div class="close-full" onclick="this.parentElement.remove()">✕</div>
        <img src="${images[currentImg]}">
    `
    document.body.appendChild(div)
}

/* KEYBOARD */
document.addEventListener("keydown", function(e){
    if(e.key === "ArrowLeft") prevImg()
    if(e.key === "ArrowRight") nextImg()
})

loadVariety()
</script>

</body>
</html>
