<!DOCTYPE html>

<html lang="et">
<head>
<meta charset="UTF-8">
<title>Sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial, sans-serif;
background:#f3f6f2;
margin:0;
padding:20px;
color:#333;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

.badge{
display:inline-block;
background:#2e7d32;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:14px;
margin-left:10px;
}

.gallery{
position:relative;
margin:20px 0;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.gallery button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
font-size:26px;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.prev{ left:10px; }
.next{ right:10px; }

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.back{
display:inline-block;
margin-top:20px;
color:#2e7d32;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">
<h1 id="name"></h1>
<p><b>Kirjeldus:</b> <span id="kirjeldus"></span></p>

<div class="gallery">
<button class="prev" onclick="prevImg()">‹</button>
<img id="galleryImg">
<button class="next" onclick="nextImg()">›</button>
</div>

<table>
<tr><td>Varasus</td><td id="varasus"></td></tr>
<tr><td>Maitsev</td><td id="maitsev"></td></tr>
<tr><td>Suurus</td><td id="suurus"></td></tr>
<tr><td>Külmakindlus</td><td id="kulmakindlus"></td></tr>
<tr><td>Värvus</td><td id="varvus"></td></tr>
<tr><td>Breba</td><td id="breba"></td></tr>
<tr><td>Riik</td><td id="riik"></td></tr>
<tr><td>Kandnud</td><td id="kandnud"></td></tr>
</table>

<a class="back" href="catalogue.html">← Tagasi kataloogi</a>

</div>

<script>
let images = []
let currentImg = 0
let startX = 0

function getId(){
const params = new URLSearchParams(window.location.search)
return params.get("id")
}

function loadGallery(fig){
images = []

if(fig.images && fig.images.length > 0){

// Multiple images
if(fig.images.length > 1){
images = fig.images
}

// Folder images
else if(fig.images[0].endsWith('/')){
for(let i=1;i<=10;i++){
images.push(fig.images[0] + i + ".jpg")
}
}

// Single image
else{
images = fig.images
}

}

currentImg = 0
showImg()
}

function showImg(){
if(images.length === 0) return
document.getElementById("galleryImg").src = images[currentImg]
}

function nextImg(){
currentImg = (currentImg + 1) % images.length
showImg()
}

function prevImg(){
currentImg = (currentImg - 1 + images.length) % images.length
showImg()
}

// Swipe mobile
document.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX
})

document.addEventListener("touchend", e=>{
let endX = e.changedTouches[0].clientX
if(endX - startX > 50) prevImg()
if(startX - endX > 50) nextImg()
})

// Fullscreen on click
document.addEventListener("click", function(e){
if(e.target.id === "galleryImg"){
if(!document.fullscreenElement){
e.target.requestFullscreen()
}else{
document.exitFullscreen()
}
}
})

async function loadVariety(){
const id = getId()
const res = await fetch("figs2.json")
const data = await res.json()
const fig = data.find(f => f.id === id)

if(!fig){
document.body.innerHTML = "Sorti ei leitud"
return
}

document.getElementById("name").innerHTML =
fig.name + (fig.saadavus === "jah" ? ' <span class="badge">Saadaval</span>' : '')

document.getElementById("kirjeldus").innerText = fig.kirjeldus || ""
document.getElementById("varasus").innerText = fig.varasus || ""
document.getElementById("maitsev").innerText = fig.maitsev || ""
document.getElementById("suurus").innerText = fig.suurus || ""
document.getElementById("kulmakindlus").innerText = fig.kulmakindlus || ""
document.getElementById("varvus").innerText = fig.varvus || ""
document.getElementById("breba").innerText = fig.breba || ""
document.getElementById("riik").innerText = fig.riik || ""
document.getElementById("kandnud").innerText = fig.kandnud || ""

loadGallery(fig)
}

loadVariety()
</script>

</body>
</html>
