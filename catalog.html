<!DOCTYPE html>
<html lang="et">
<head>

<meta charset="UTF-8">
<title>Viigipuu sordid</title>

<style>

body{
font-family:Arial;
background:#f3f6f2;
padding:40px;
}

button{
padding:8px 14px;
margin-right:8px;
border-radius:6px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th, td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#e9eee7;
cursor:pointer;
}

th:hover{
background:#dfe6da;
}

</style>

</head>

<body>

<h1>Viigipuu sordid</h1>

<div style="margin-bottom:20px">

<button id="kandnudBtn">Näita ka sorte, mis pole veel kandnud</button>
<button id="saadavusBtn">Näita ka sorte, mis pole hetkel saadaval</button>

</div>

<table id="figTable">

<thead>
<tr>
<th onclick="sortTable(0)">Sort</th>
<th onclick="sortTable(1)">Varasus</th>
<th onclick="sortTable(2)">Maitsev</th>
<th onclick="sortTable(3)">Suurus</th>
<th onclick="sortTable(4)">Suhteline külmakindlus</th>
<th onclick="sortTable(5)">Värvus</th>
<th onclick="sortTable(6)">Breba</th>
<th onclick="sortTable(7)">Riik</th>
<th onclick="sortTable(8)">Saadavus</th>
</tr>
</thead>

<tbody id="figBody"></tbody>

</table>

<script>

let filterKandnud = true
let filterSaadavus = true
let figsData = []

function renderTable(data){

const body=document.getElementById("figBody")
body.innerHTML=""

data.forEach(fig=>{

if(filterKandnud && fig.kandnud !== "jah") return
if(filterSaadavus && fig.saadavus !== "jah") return

const row=document.createElement("tr")

row.innerHTML=`
<td>${fig.name}</td>
<td>${fig.varasus}</td>
<td>${fig.maitsev}</td>
<td>${fig.suurus}</td>
<td>${fig.kulmakindlus}</td>
<td>${fig.varvus}</td>
<td>${fig.breba}</td>
<td>${fig.riik}</td>
<td>${fig.saadavus}</td>
`

body.appendChild(row)

})

}

fetch("figs.json")
.then(res=>res.json())
.then(data=>{

figsData=data
renderTable(figsData)

})

document.getElementById("kandnudBtn").onclick = () => {

filterKandnud = !filterKandnud

document.getElementById("kandnudBtn").innerText =
"Kandnud: " + (filterKandnud ? "jah, ainult kandnud sordid" : "kõik sordid")

renderTable(figsData)

}

document.getElementById("saadavusBtn").onclick = () => {

filterSaadavus = !filterSaadavus

document.getElementById("saadavusBtn").innerText =
"Saadavus: " + (filterSaadavus ? "jah, ainult saadaval sordid" : "kõik sordid")

renderTable(figsData)

}

const orderVarasus = {
"kõige varasem":1,
"varane":2,
"":3,
"hiline":4
}

const orderMaitsev = {
"erakordselt":1,
"jah":2,
"":3
}

const orderSuurus = {
"mega":1,
"suur":2,
"keskmine":3,
"väike":4,
"":5
}

const orderKulm = {
"jah":1,
"":2,
"ei":3
}

const orderBreba = {
"jah":1,
"mõningane":2,
"":3,
"ei":4
}

const orderSaadavus = {
"jah":1,
"ei":2
}

function sortTable(n){

const table=document.getElementById("figTable")
let rows=Array.from(table.rows).slice(1)

rows.sort((a,b)=>{

let x=a.cells[n].innerText.toLowerCase().trim()
let y=b.cells[n].innerText.toLowerCase().trim()

if(n===0) return x.localeCompare(y)
if(n===1) return (orderVarasus[x]||99)-(orderVarasus[y]||99)
if(n===2) return (orderMaitsev[x]||99)-(orderMaitsev[y]||99)
if(n===3) return (orderSuurus[x]||99)-(orderSuurus[y]||99)
if(n===4) return (orderKulm[x]||99)-(orderKulm[y]||99)
if(n===5) return x.localeCompare(y)
if(n===6) return (orderBreba[x]||99)-(orderBreba[y]||99)
if(n===7) return x.localeCompare(y)
if(n===8) return (orderSaadavus[x]||99)-(orderSaadavus[y]||99)

})

rows.forEach(row=>table.appendChild(row))

}

</script>

</body>
</html>
