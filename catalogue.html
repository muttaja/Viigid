<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="images/ui/fig-icon.png">
<link rel="shortcut icon" href="images/ui/fig-icon.png">
<link rel="apple-touch-icon" href="images/ui/fig-icon.png">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    padding:20px;
}

h1{
    margin-bottom:5px;
}

p{
    margin-top:5px;
    margin-bottom:15px;
}

/* LINKS – remove visited color */
a, a:visited{
    color:var(--green);
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* TOOLTIP */
.q{
    display:inline-block;
    width:14px;
    height:14px;
    border-radius:50%;
    background:#2e7d32;
    color:white;
    font-size:10px;
    line-height:14px;
    text-align:center;
    margin-left:4px;
    position:relative;
    cursor:help;
    text-decoration:none;
}

.q:hover::after{
    content: attr(data-text);
    position:absolute;
    left:18px;
    top:-5px;
    background:#333;
    color:white;
    padding:8px;
    border-radius:6px;
    width:220px;
    font-size:12px;
    line-height:1.4em;
    z-index:100;
}

/* Disable hover tooltips on mobile */
@media (hover: none){
    .q:hover::after{
        display:none;
    }
}

/* IMAGE SLIDER */
.image-slider{
    position:relative;
    margin-bottom:15px;
}

.image-frame{
    width:100%;
    height:420px;
    background:#00000015;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    overflow:hidden;
    touch-action: pan-y;
}

.image-frame img{
    max-width:100%;
    max-height:100%;
    cursor:pointer;
}

/* ARROWS */
.img-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:26px;
    padding:8px 14px;
    cursor:pointer;
    border-radius:6px;
}

.img-left{ left:10px; }
.img-right{ right:10px; }

/* DOTS */
.img-dots{
    text-align:center;
    margin-top:8px;
}

.img-dot{
    display:inline-block;
    width:8px;
    height:8px;
    margin:0 4px;
    background:#aaa;
    border-radius:50%;
    cursor:pointer;
}

.img-dot.active{
    background:#555;
}

.img-counter{
    text-align:center;
    font-size:13px;
    opacity:0.7;
    margin-top:3px;
}

/* NAV LINKS */
.nav-links{
    margin-top:25px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    gap:40px;
}

/* FULLSCREEN */
.fullscreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.fullscreen img{
    max-width:95%;
    max-height:95%;
}

.close-full{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:30px;
    cursor:pointer;
}

/* INFO GRID */
.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:15px;
    font-size:15px;
}

.info-col div{
    margin-bottom:6px;
}

@media (max-width:700px){
.image-frame{
    height:260px;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card" id="varietyCard"></div>
</div>

<script>
let images = []
let currentImg = 0
let startX = 0
let startY = 0

function getId(){
    const params = new URLSearchParams(window.location.search)
    return params.get("id")
}

/* LOAD ONLY EXISTING IMAGES */
function loadImages(folder){
    return new Promise(resolve=>{
        let list = []
        let i = 1

        function check(){
            let img = new Image()
            let path = folder + i + ".jpg"

            img.onload = function(){
                list.push(path)
                i++
                check()
            }

            img.onerror = function(){
                resolve(list)
            }

            img.src = path
        }

        check()
    })
}

async function loadVariety(){
    const id = getId()

    const res = await fetch("figs.json")
    const data = await res.json()

    const f = data.find(x => x.id === id)
    if(!f) return

    if(f.images && f.images[0].endsWith("/")){
        images = await loadImages(f.images[0])
    } else {
        images = f.images || []
    }

    buildPage(f)
}

/* BUILD PAGE */
function buildPage(f){
    currentImg = 0
    const card = document.getElementById("varietyCard")

    card.innerHTML = `
        <h1>
            ${f.name}
            ${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval)</span>' : ''}
        </h1>

        <p>${f.kirjeldus || ""}</p>

        <div class="image-slider">
            ${images.length>1 ? '<button class="img-arrow img-left" id="prevBtn">‹</button>' : ''}
            ${images.length>1 ? '<button class="img-arrow img-right" id="nextBtn">›</button>' : ''}

            <div class="image-frame" id="imageFrame">
                <img id="varImg" src="${images[0] || ''}">
            </div>

            <div class="img-dots" id="dots"></div>
            <div class="img-counter" id="counter"></div>
        </div>

        <div class="info-grid">
            <div class="info-col">
                <div><b>Varasus</b> <a href="legend.html#varasus" class="q" data-text="Viljade valmimine päevades alates viljade moodustumisest. Kõige varasemad sordid ~60 päeva, hilised üle 90 päeva.">?</a>: ${f.varasus}</div>
                <div><b>Suurus</b> <a href="legend.html#suurus" class="q" data-text="Viljade kaal: väike <20g, keskmine 30–50g, suur 50–80g, mega >80g.">?</a>: ${f.suurus}</div>
                <div><b>Värvus</b> <a href="legend.html#varvus" class="q" data-text="Vilja koore värvus küpsena.">?</a>: ${f.varvus}</div>
                <div><b>Maitsev</b> <a href="legend.html#maitsev" class="q" data-text="Subjektiivne hinnang vilja maitsele Eesti tingimustes.">?</a>: ${f.maitsev}</div>
            </div>

            <div class="info-col">
                <div><b>Külmakindlus</b> <a href="legend.html#kulmakindlus" class="q" data-text="Külmakindlus võrreldes teiste sortidega.">?</a>: ${f.kulmakindlus}</div>
                <div><b>Breba</b> <a href="legend.html#breba" class="q" data-text="Kas sort annab saaki eelmise aasta võrsetelt.">?</a>: ${f.breba}</div>
                <div><b>Riik</b> <a href="legend.html#riik" class="q" data-text="Sordi päritoluriik.">?</a>: ${f.riik}</div>
                <div><b>Saadavus</b> <a href="legend.html#saadavus" class="q" data-text="Kas istikuid on hetkel või lähiajal saadaval.">?</a>: ${f.saadavus}</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="index.html">← Avalehele</a>
            <a href="catalogue.html">Kataloogi →</a>
        </div>
    `

    setupSlider()
}

/* SLIDER */
function setupSlider(){
    const img = document.getElementById("varImg")
    const dotsDiv = document.getElementById("dots")

    dotsDiv.innerHTML = images.map((_,i)=>`<span class="img-dot" data-i="${i}"></span>`).join("")
    updateDots()

    if(document.getElementById("prevBtn")){
        document.getElementById("prevBtn").onclick = prevImg
        document.getElementById("nextBtn").onclick = nextImg
    }

    document.querySelectorAll(".img-dot").forEach(dot=>{
        dot.onclick = () => {
            currentImg = parseInt(dot.dataset.i)
            img.src = images[currentImg]
            updateDots()
        }
    })

    img.onclick = openFullscreen

    const frame = document.getElementById("imageFrame")

    frame.addEventListener("touchstart", e=>{
        startX = e.touches[0].clientX
        startY = e.touches[0].clientY
    })

    frame.addEventListener("touchend", e=>{
        let endX = e.changedTouches[0].clientX
        let endY = e.changedTouches[0].clientY

        let diffX = endX - startX
        let diffY = endY - startY

        if(Math.abs(diffX) > Math.abs(diffY)){
            if(diffX > 50) prevImg()
            if(diffX < -50) nextImg()
        }
    })
}

function nextImg(){
    if(currentImg < images.length-1){
        currentImg++
    } else {
        currentImg = 0
    }
    document.getElementById("varImg").src = images[currentImg]
    updateDots()
}

function prevImg(){
    if(currentImg > 0){
        currentImg--
    } else {
        currentImg = images.length-1
    }
    document.getElementById("varImg").src = images[currentImg]
    updateDots()
}

function updateDots(){
    const dots = document.querySelectorAll(".img-dot")
    dots.forEach(d=>d.classList.remove("active"))
    if(dots[currentImg]) dots[currentImg].classList.add("active")

    document.getElementById("counter").innerText =
        (currentImg+1) + " / " + images.length
}

/* FULLSCREEN */
function openFullscreen(){
    const div = document.createElement("div")
    div.className = "fullscreen"
    div.innerHTML = `
        <div class="close-full" onclick="this.parentElement.remove()">✕</div>
        <img src="${images[currentImg]}">
    `
    document.body.appendChild(div)
}

/* KEYBOARD */
document.addEventListener("keydown", function(e){
    if(e.key === "ArrowLeft") prevImg()
    if(e.key === "ArrowRight") nextImg()
})

loadVariety()
</script>

</body>
</html>
