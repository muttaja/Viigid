<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuu sordid</title>

<style>
body{
font-family:Arial;
background:#f3f6f2;
padding:40px;
color:#333;
transition:background 0.3s, color 0.3s;
}

a{
color:#2e7d32;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

button{
padding:8px 14px;
margin-right:8px;
border-radius:6px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
background:white;
transition:background 0.3s;
}

th, td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#e9eee7;
cursor:pointer;
}

th:hover{
background:#dfe6da;
}

/* FIG ICON */
.fig-icon{
width:18px;
height:18px;
vertical-align:middle;
margin-left:6px;
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
body{
background:#121212;
color:#e0e0e0;
}

table{
background:#1e1e1e;
}

th{
background:#2a2a2a;
}

td{
border:1px solid #333;
}

a{
color:#81c784;
}
}
</style>

</head>

<body>

<h1>Viigipuu sordid</h1>

<div style="margin-bottom:20px">
<button id="kandnudBtn">Näita ka sorte, mis pole veel kandnud</button>
<button id="saadavusBtn">Näita ka sorte, mis pole hetkel saadaval</button>
</div>

<table id="figTable">
<thead>
<tr>
<th onclick="sortTable(0)">Sort</th>
<th onclick="sortTable(1)">Varasus</th>
<th onclick="sortTable(2)">Maitsev</th>
<th onclick="sortTable(3)">Suurus</th>
<th onclick="sortTable(4)">Suhteline külmakindlus</th>
<th onclick="sortTable(5)">Värvus</th>
<th onclick="sortTable(6)">Breba</th>
<th onclick="sortTable(7)">Riik</th>
<th onclick="sortTable(8)">Saadavus</th>
</tr>
</thead>
<tbody id="figBody"></tbody>
</table>

<script>
let filterKandnud=true
let filterSaadavus=true
let figsData=[]

function renderTable(data){
const body=document.getElementById("figBody")
body.innerHTML=""

data=[...data].sort((a,b)=>a.name.localeCompare(b.name,'et'))

data.forEach(fig=>{
if(filterKandnud && fig.kandnud!=="jah") return
if(filterSaadavus && fig.saadavus!=="jah") return

let photoIcon = ""
if(fig.images && fig.images.length>0){
photoIcon = '<img src="images/ui/fig-icon.png" class="fig-icon">'
}

const row=document.createElement("tr")

row.innerHTML=`
<td><a href="variety.html?id=${fig.id}">${fig.name}</a> ${photoIcon}</td>
<td>${fig.varasus}</td>
<td>${fig.maitsev}</td>
<td>${fig.suurus}</td>
<td>${fig.kulmakindlus}</td>
<td>${fig.varvus}</td>
<td>${fig.breba}</td>
<td>${fig.riik}</td>
<td>${fig.saadavus}</td>
`

body.appendChild(row)
})
}

fetch("figs.json")
.then(res=>res.json())
.then(data=>{
figsData=data
renderTable(figsData)
})

document.getElementById("kandnudBtn").onclick=()=>{
filterKandnud=!filterKandnud
renderTable(figsData)
}

document.getElementById("saadavusBtn").onclick=()=>{
filterSaadavus=!filterSaadavus
renderTable(figsData)
}

const orderVarasus = {
"kõige varasem":1,
"väga varane":2,
"varane":3,
"keskmine":4,
"":5,
"hiline":6
}

function sortTable(n){
const table=document.getElementById("figTable")
let rows=Array.from(table.rows).slice(1)

rows.sort((a,b)=>{
let x=a.cells[n].innerText.toLowerCase().trim()
let y=b.cells[n].innerText.toLowerCase().trim()

if(n===0) return x.localeCompare(y)
if(n===1) return (orderVarasus[x]||99)-(orderVarasus[y]||99)

return x.localeCompare(y)
})

rows.forEach(row=>table.appendChild(row))
}
</script>

</body>
</html>
