<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffffcc;
    --text:#333;
    --green1:#6aa36f;
    --green2:#3f6f45;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1b1f1c;
    --card:#2a2f2bcc;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:system-ui, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    text-align:center;
}

.container{
    padding:30px 15px;
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

/* SLIDER */
.slider{
    position:relative;
    margin:auto;
    max-width:900px;
}

.slide{
    background:var(--card);
    backdrop-filter:blur(8px);
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    overflow:hidden;
    transition:0.4s;
}

.slide img{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:16px;
}

.slide-content{
    padding:22px;
    text-align:left;
}

.slide a{
    color:inherit;
    text-decoration:none;
}

/* DESCRIPTION */
.desc{
    color:#999;
    margin-top:5px;
    margin-bottom:12px;
}

/* INFO GRID */
.info-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px 20px;
    font-size:15px;
    margin-top:10px;
    border-top:1px solid rgba(150,150,150,0.2);
    padding-top:12px;
}

/* ARROWS */
.arrow{
    position:absolute;
    top:45%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:28px;
    padding:10px 16px;
    cursor:pointer;
    border-radius:10px;
}

.arrow-left{ left:10px; }
.arrow-right{ right:10px; }

/* SLIDE DOTS */
.dots{
    margin:15px 0;
}

.dot{
    display:inline-block;
    width:8px;
    height:8px;
    margin:0 4px;
    background:#aaa;
    border-radius:50%;
}

.dot.active{
    background:#fff;
}

/* SLIDE COUNTER */
.counter{
    font-size:13px;
    opacity:0.6;
    margin-top:5px;
}

/* BUTTON */
.button{
    display:block;
    width:90%;
    max-width:600px;
    margin:20px auto;
    padding:16px;
    font-size:18px;
    color:white;
    background:linear-gradient(45deg,var(--green1),var(--green2));
    text-decoration:none;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

/* FACEBOOK */
.fb-banner{
    margin:25px auto;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    max-width:750px;
}

.fb-banner img{
    width:100%;
    display:block;
}

/* MOBILE */
@media (max-width:700px){
.slide img{
    height:260px;
}
.arrow{
    font-size:22px;
    padding:8px 12px;
}
}
</style>
</head>

<body>

<div class="container">
<h1>Viigipuud Eestis</h1>

<div class="slider">
<button class="arrow arrow-left" onclick="prevSlide()">‹</button>
<button class="arrow arrow-right" onclick="nextSlide()">›</button>
<div id="slideContainer"></div>
<div class="dots" id="dots"></div>
<div class="counter" id="counter"></div>
</div>

<a class="button" href="catalogue.html">
Vaata kõiki saadaval sorte
</a>

<a href="https://www.facebook.com/groups/1096702358191767/" target="_blank">
<div class="fb-banner">
<img src="../images_fb/banner.png">
</div>
</a>

</div>

<script>
let figs = []
let slideList = []
let current = 0
let slideTimer

async function loadSlides(){

    const txt = await fetch("../for_slides/for_slides.txt")
    const text = await txt.text()
    slideList = text.split("\n").map(s=>s.trim()).filter(Boolean)

    const res = await fetch("figs.json")
    const data = await res.json()

    for(const id of slideList){
        const f = data.find(x => x.id === id)
        if(f && f.images && f.images.length > 0){
            figs.push(f)
        }
    }

    if(figs.length > 0){
        showSlide()
        createDots()
        slideTimer = setInterval(nextSlide, 6000)
    }
}

function showSlide(){
    const f = figs[current]
    const imgPath = f.images[0].replace("../","")

    document.getElementById("slideContainer").innerHTML = `
    <div class="slide">
        <a href="variety.html?id=${f.id}">
            <img src="${imgPath}" loading="lazy">
        </a>
        <div class="slide-content">
            <h2>
                <a href="variety.html?id=${f.id}">
                    ${f.name}
                </a>
                ${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval)</span>' : ''}
            </h2>

            <div class="desc">${f.kirjeldus || ""}</div>

            <div class="info-grid">
                <div><b>Varasus:</b> ${f.varasus}</div>
                <div><b>Maitsev:</b> ${f.maitsev}</div>
                <div><b>Suurus:</b> ${f.suurus}</div>
                <div><b>Breba:</b> ${f.breba}</div>
                <div><b>Külmakindlus:</b> ${f.kulmakindlus}</div>
                <div><b>Riik:</b> ${f.riik}</div>
            </div>
        </div>
    </div>`

    updateDots()
    document.getElementById("counter").innerText =
        (current+1) + " / " + figs.length
}

function nextSlide(){
    current = (current + 1) % figs.length
    showSlide()
}

function prevSlide(){
    current = (current - 1 + figs.length) % figs.length
    showSlide()
}

/* DOTS */
function createDots(){
    let dotsHTML=""
    for(let i=0;i<figs.length;i++){
        dotsHTML += `<span class="dot" onclick="goToSlide(${i})"></span>`
    }
    document.getElementById("dots").innerHTML = dotsHTML
}

function updateDots(){
    const dots = document.querySelectorAll(".dot")
    dots.forEach(d=>d.classList.remove("active"))
    if(dots[current]) dots[current].classList.add("active")
}

function goToSlide(i){
    current=i
    showSlide()
}

/* MOBILE SWIPE */
let startX = 0
document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX
})
document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX
    if(endX - startX > 50) prevSlide()
    if(startX - endX > 50) nextSlide()
})

loadSlides()
</script>

</body>
</html>
