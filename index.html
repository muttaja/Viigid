<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    text-align:center;
}

.container{
    padding:30px 15px;
    max-width:1100px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

/* SLIDER */
.slider{
    position:relative;
    margin:auto;
    max-width:900px;
}

.slide{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    overflow:hidden;
}

.slide img{
    width:100%;
    height:420px;
    object-fit:cover;
}

.slide-content{
    padding:20px;
    text-align:left;
}

.slide a{
    color:inherit;
    text-decoration:none;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    font-size:14px;
    margin-top:10px;
}

/* FIG LEAF ARROWS OUTSIDE */
.arrow{
    background:none;
    border:none;
    cursor:pointer;
    position:absolute;
    top:45%;
    transform:translateY(-50%);
    z-index:10;
}

.arrow img{
    width:95px;
    transition:0.25s;
}

.arrow img:hover{
    transform:scale(1.15);
}

/* SWITCHED SIDES */
.arrow-left{ left:-120px; }
.arrow-right{ right:-120px; }

/* ROTATION */
.arrow-left img{ transform: rotate(12deg); }
.arrow-right img{ transform: rotate(-12deg); }

/* MOBILE */
@media (max-width:900px){
.arrow-left{ left:-10px; }
.arrow-right{ right:-10px; }

.arrow img{
    width:55px;
}

.slide img{
    height:260px;
}
}

/* DOTS */
.dots{
    margin-top:12px;
}

.dot{
    display:inline-block;
    width:8px;
    height:8px;
    margin:4px;
    background:#aaa;
    border-radius:50%;
}

.dot.active{
    background:#555;
}

/* COUNTER */
.counter{
    margin-top:4px;
    font-size:13px;
    opacity:0.7;
}

/* BUTTON */
.button{
    display:inline-block;
    margin:20px 0;
    padding:14px 26px;
    font-size:18px;
    color:white;
    background:var(--green);
    text-decoration:none;
    border-radius:8px;
}

/* FACEBOOK */
.fb-banner{
    margin:20px auto;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
    line-height:0;
    max-width:750px;
}

.fb-banner img{
    width:100%;
    display:block;
    transition:0.2s;
}

.fb-banner img:hover{
    transform:scale(1.02);
}
</style>
</head>

<body>

<div class="container">
<h1>Viigipuud Eestis</h1>

<div class="slider">

<!-- SWITCHED ARROWS -->
<button class="arrow arrow-left" onclick="nextSlide()">
    <img src="images/ui/leaf-right.png">
</button>

<button class="arrow arrow-right" onclick="prevSlide()">
    <img src="images/ui/leaf-left.png">
</button>

<div id="slideContainer"></div>
<div class="dots" id="dots"></div>
<div class="counter" id="counter"></div>

</div>

<a class="button" href="catalogue.html">
Vaata kõiki saadaval sorte
</a>

<a href="https://www.facebook.com/groups/1096702358191767/" target="_blank">
<div class="fb-banner">
<img src="../images_fb/banner.png">
</div>
</a>

</div>

<script>
let figs = []
let slideList = []
let current = 0
let slideTimer
let startX = 0

async function loadSlides(){

    const txt = await fetch("../for_slides/for_slides.txt")
    const text = await txt.text()
    slideList = text.split("\n").map(s=>s.trim()).filter(Boolean)

    const res = await fetch("figs.json")
    const data = await res.json()

    for(const id of slideList){
        const f = data.find(x => x.id === id)
        if(f && f.images && f.images.length > 0){
            figs.push(f)
        }
    }

    createDots()
    showSlide()
    slideTimer = setInterval(nextSlide, 6000)
}

function showSlide(){
    const f = figs[current]
    const imgPath = f.images[0]

    document.getElementById("slideContainer").innerHTML = `
    <div class="slide">
        <a href="variety.html?id=${f.id}">
            <img src="${imgPath}" loading="lazy">
        </a>
        <div class="slide-content">
            <h2>
                <a href="variety.html?id=${f.id}">
                    ${f.name}
                </a>
                ${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval)</span>' : ''}
            </h2>

            <p>${f.kirjeldus || ""}</p>

            <div class="info-grid">
                <div><b>Varasus:</b> ${f.varasus}</div>
                <div><b>Maitsev:</b> ${f.maitsev}</div>
                <div><b>Suurus:</b> ${f.suurus}</div>
                <div><b>Külmakindlus:</b> ${f.kulmakindlus}</div>
                <div><b>Värvus:</b> ${f.varvus}</div>
                <div><b>Breba:</b> ${f.breba}</div>
                <div><b>Riik:</b> ${f.riik}</div>
            </div>
        </div>
    </div>`

    updateDots()
    document.getElementById("counter").innerText = (current+1) + " / " + figs.length
}

function nextSlide(){
    current = (current + 1) % figs.length
    showSlide()
}

function prevSlide(){
    current = (current - 1 + figs.length) % figs.length
    showSlide()
}

function createDots(){
    const dots = document.getElementById("dots")
    dots.innerHTML = ""
    for(let i=0;i<figs.length;i++){
        dots.innerHTML += `<span class="dot"></span>`
    }
}

function updateDots(){
    const dots = document.querySelectorAll(".dot")
    dots.forEach(d=>d.classList.remove("active"))
    if(dots[current]) dots[current].classList.add("active")
}

/* SWIPE */
document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX
})

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX
    if(endX - startX > 50) prevSlide()
    if(startX - endX > 50) nextSlide()
})

/* PAUSE ON HOVER */
const slider = document.querySelector(".slider")
slider.addEventListener("mouseenter", ()=> clearInterval(slideTimer))
slider.addEventListener("mouseleave", ()=> slideTimer = setInterval(nextSlide, 6000))

/* KEYBOARD */
document.addEventListener("keydown", function(e){
    if(e.key === "ArrowLeft") prevSlide()
    if(e.key === "ArrowRight") nextSlide()
})

loadSlides()
</script>

</body>
</html>
