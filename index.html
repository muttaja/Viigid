<!DOCTYPE html>

<html lang="et">
<head>
<meta charset="UTF-8">
<title>Ficus.ee – Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f6f2;
text-align:center;
color:#333;
transition:background 0.3s, color 0.3s;
}

.container{
padding:40px 20px;
}

h1{
font-size:34px;
margin-bottom:30px;
}

.slider{
max-width:900px;
margin:auto;
position:relative;
}

.slide{
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
overflow:hidden;
margin-bottom:20px;
}

.slide-image{
display:flex;
align-items:center;
justify-content:center;
height:500px;
background:white;
cursor:pointer;
}

.slide-image img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.slide-content{
padding:20px;
text-align:left;
}

.slide-title{
cursor:pointer;
color:#1b5e20;
}

.slide-title:hover{
text-decoration:underline;
}

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:6px;
font-size:15px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
font-size:30px;
padding:10px 18px;
cursor:pointer;
border-radius:8px;
}

.arrow-left{ left:10px; }
.arrow-right{ right:10px; }

.button{
display:inline-block;
margin-top:30px;
padding:14px 28px;
font-size:18px;
color:white;
background:#2e7d32;
text-decoration:none;
border-radius:8px;
}

/* Facebook card */
.fb-card{
display:block;
max-width:900px;
margin:60px auto;
border-radius:14px;
overflow:hidden;
text-decoration:none;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
transition:0.2s;
}

.fb-card:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.fb-image{
position:relative;
}

.fb-image img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.fb-overlay{
position:absolute;
bottom:0;
left:0;
right:0;
background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0));
color:white;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.fb-logo{
width:50px;
height:50px;
}

.fb-text h3{
margin:0;
font-size:20px;
}

.fb-text p{
margin:4px 0 0 0;
font-size:14px;
}

/* Dark mode */
@media (prefers-color-scheme: dark){
body{
background:#121212;
color:#e0e0e0;
}

.slide{
background:#1e1e1e;
}

.slide-image{
background:#1e1e1e;
}

.slide-title{
color:#81c784;
}

.button{
background:#388e3c;
}
}

/* Mobile */
@media(max-width:600px){
.slide-image{
height:300px;
}

.fb-image img{
height:180px;
}

.fb-overlay{
flex-direction:column;
align-items:flex-start;
}

.fb-logo{
width:40px;
height:40px;
}
}
</style>

</head>

<body>

<div class="container">
<h1>Ficus.ee – Viigipuud Eestis</h1>

<div class="slider" id="slider">
<button class="arrow arrow-left" onclick="prevSlide()">‹</button>
<button class="arrow arrow-right" onclick="nextSlide()">›</button>
<div id="slideContainer"></div>
</div>

<a class="button" href="catalogue.html">
Vaata kõiki saadaval sorte
</a>

<!-- Facebook card -->

<a href="https://www.facebook.com/groups/1096702358191767/" target="_blank" class="fb-card">
<div class="fb-image">
<img src="../images_fb/facebook-cover.jpg">
<div class="fb-overlay">
<img class="fb-logo" src="../images_fb/facebook-logo.png">
<div class="fb-text">
<h3>Viigipuude grupp Facebookis</h3>
<p>Liitu Eesti viigipuude kasvatajate kogukonnaga. Jagame kogemusi ja katsetame sorte.</p>
</div>
</div>
</div>
</a>

</div>

<script>
let figs=[]
let slideOrder=[]
let slides=[]
let current=0
let slideTimer
let startX=0
let endX=0

async function loadSlides(){
const res=await fetch("figs2.json")
figs=await res.json()

const txt=await fetch("for_slides/for_slides.txt")
const text=await txt.text()
slideOrder=text.split("\n").map(s=>s.trim()).filter(s=>s)

slides=slideOrder.map(id=>figs.find(f=>f.id===id)).filter(f=>f)

showSlide()
slideTimer=setInterval(nextSlide,6000)
}

function getImagePath(f){
return "images/"+f.id+"/1.jpg"
}

function openVariety(){
const f=slides[current]
window.location.href="variety.html?id="+f.id
}

function showSlide(){
if(slides.length===0) return

const f=slides[current]
const imgPath=getImagePath(f)

document.getElementById("slideContainer").innerHTML=`
<div class="slide">
<div class="slide-image" onclick="openVariety()">
<img src="${imgPath}" onerror="nextSlide()">
</div>

<div class="slide-content">
<h2 class="slide-title" onclick="openVariety()">
${f.name}
${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval!)</span>' : ''}
</h2>

<p>${f.kirjeldus || ""}</p>

<div class="info-grid">
<div><b>Varasus:</b> ${f.varasus}</div>
<div><b>Maitsev:</b> ${f.maitsev}</div>
<div><b>Suurus:</b> ${f.suurus}</div>
<div><b>Külmakindlus:</b> ${f.kulmakindlus}</div>
<div><b>Värvus:</b> ${f.varvus}</div>
<div><b>Breba:</b> ${f.breba}</div>
<div><b>Riik:</b> ${f.riik}</div>
</div>
</div>
</div>`
}

function nextSlide(){
clearInterval(slideTimer)
current=(current+1)%slides.length
showSlide()
slideTimer=setInterval(nextSlide,6000)
}

function prevSlide(){
clearInterval(slideTimer)
current=(current-1+slides.length)%slides.length
showSlide()
slideTimer=setInterval(nextSlide,6000)
}

/* Swipe mobile */
const slider=document.getElementById("slider")

slider.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

slider.addEventListener("touchend",e=>{
endX=e.changedTouches[0].clientX
if(endX-startX>50) prevSlide()
if(startX-endX>50) nextSlide()
})

loadSlides()
</script>

</body>
</html>
