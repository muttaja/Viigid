<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Ficus.ee – Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    text-align:center;
}

.container{
    padding:30px 15px;
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

/* SLIDER */
.slider{
    position:relative;
    margin:auto;
    max-width:900px;
}

.slide{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    overflow:hidden;
}

.slide img{
    width:100%;
    height:420px;
    object-fit:cover;
    transform:scale(0.8); /* zoom out 20% */
}

.slide-content{
    padding:20px;
    text-align:left;
}

.slide a{
    color:inherit;
    text-decoration:none;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    font-size:14px;
}

.arrow{
    position:absolute;
    top:45%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:28px;
    padding:10px 16px;
    cursor:pointer;
    border-radius:8px;
}

.arrow-left{ left:10px; }
.arrow-right{ right:10px; }

/* BUTTON */
.button{
    display:inline-block;
    margin:25px 0;
    padding:14px 26px;
    font-size:18px;
    color:white;
    background:var(--green);
    text-decoration:none;
    border-radius:8px;
}

/* FACEBOOK BANNER */
.fb-banner{
    margin-top:30px;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

.fb-banner img{
    width:100%;
    display:block;
}

/* MOBILE */
@media (max-width:700px){
.slide img{
    height:260px;
}
.arrow{
    font-size:22px;
    padding:8px 12px;
}
}
</style>
</head>

<body>

<div class="container">
<h1>Ficus.ee – Viigipuud Eestis</h1>

<div class="slider">
<button class="arrow arrow-left" onclick="prevSlide()">‹</button>
<button class="arrow arrow-right" onclick="nextSlide()">›</button>
<div id="slideContainer"></div>
</div>

<a class="button" href="catalogue.html">
Vaata kõiki saadaval sorte
</a>

<!-- FACEBOOK BANNER -->
<a href="https://www.facebook.com/groups/1096702358191767/" target="_blank">
<div class="fb-banner">
<img src="../images_fb/banner.png">
</div>
</a>

</div>

<script>
let figs = []
let slideList = []
let current = 0
let slideTimer

async function loadSlides(){

    // load slide order
    const txt = await fetch("../for_slides/for_slides.txt")
    const text = await txt.text()
    slideList = text.split("\n").map(s=>s.trim()).filter(Boolean)

    // load json
    const res = await fetch("figs.json")
    const data = await res.json()

    // build slides only from list
    for(const id of slideList){
        const f = data.find(x => x.id === id)
        if(f && f.images && f.images.length > 0){
            figs.push(f)
        }
    }

    if(figs.length > 0){
        showSlide()
        slideTimer = setInterval(nextSlide, 6000)
    }
}

function showSlide(){
    const f = figs[current]
    const imgPath = f.images[0].replace("../","")

    document.getElementById("slideContainer").innerHTML = `
    <div class="slide">
        <a href="variety.html?id=${f.id}">
            <img src="${imgPath}">
        </a>
        <div class="slide-content">
            <h2>
                <a href="variety.html?id=${f.id}">
                    ${f.name}
                </a>
                ${f.saadavus=="jah" ? '<span style="color:lightgreen;"> (saadaval)</span>' : ''}
            </h2>

            <p>${f.kirjeldus || ""}</p>

            <div class="info-grid">
                <div><b>Varasus:</b> ${f.varasus}</div>
                <div><b>Maitsev:</b> ${f.maitsev}</div>
                <div><b>Suurus:</b> ${f.suurus}</div>
                <div><b>Külmakindlus:</b> ${f.kulmakindlus}</div>
                <div><b>Värvus:</b> ${f.varvus}</div>
                <div><b>Breba:</b> ${f.breba}</div>
                <div><b>Riik:</b> ${f.riik}</div>
            </div>
        </div>
    </div>`
}

function nextSlide(){
    current = (current + 1) % figs.length
    showSlide()
}

function prevSlide(){
    current = (current - 1 + figs.length) % figs.length
    showSlide()
}

/* MOBILE SWIPE */
let startX = 0

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX
})

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX
    if(endX - startX > 50) prevSlide()
    if(startX - endX > 50) nextSlide()
})

loadSlides()
</script>

</body>
</html>
