<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f3f6f2;
    --card:#ffffff;
    --text:#333;
    --green:#2e7d32;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#1e1e1e;
    --card:#2a2a2a;
    --text:#e8e8e8;
}
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    text-align:center;
}

.container{
    padding:30px 15px;
    max-width:1100px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

/* SLIDER */
.slider{
    position:relative;
    margin:auto;
    max-width:900px;
    touch-action: manipulation;
}

.slide{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    overflow:hidden;
    animation:fade 0.4s ease;
}

@keyframes fade{
    from{opacity:0.4;}
    to{opacity:1;}
}

/* IMAGE */
.slide img{
    width:100%;
    height:500px;
    object-fit:cover;
    transform:scale(0.85);
}

/* CONTENT AREA FIXED HEIGHT */
.slide-content{
    padding:20px;
    text-align:left;
    height:190px;
    display:flex;
    flex-direction:column;
}

/* DESCRIPTION ALWAYS SAME HEIGHT */
.slide-desc{
    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    overflow:hidden;
    line-height:1.4em;
    height:1.4em;
    margin-bottom:6px;
}

.slide a{
    color:inherit;
    text-decoration:none;
}

/* INFO GRID */
.info-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    font-size:14px;
    margin-top:10px;
}

/* ARROWS */
.arrow{
    background:none;
