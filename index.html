<!DOCTYPE html>

<html lang="et">
<head>
<meta charset="UTF-8">
<title>Ficus.ee – Viigipuud Eestis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f6f2;
text-align:center;
color:#333;
}

.container{
padding:40px 20px;
}

h1{
font-size:34px;
margin-bottom:30px;
}

.slider{
max-width:900px;
margin:auto;
position:relative;
}

.slide{
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
overflow:hidden;
}

.slide img{
width:100%;
height:500px;
object-fit:cover;
}

.slide-content{
padding:20px;
text-align:left;
}

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:6px;
font-size:15px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
font-size:30px;
padding:10px 18px;
cursor:pointer;
border-radius:8px;
}

.arrow-left{ left:10px; }
.arrow-right{ right:10px; }

.button{
display:inline-block;
margin-top:30px;
padding:14px 28px;
font-size:18px;
color:white;
background:#2e7d32;
text-decoration:none;
border-radius:8px;
}

.fb-section{
margin-top:60px;
max-width:900px;
margin-left:auto;
margin-right:auto;
background:white;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
overflow:hidden;
}

.fb-section img{
width:100%;
height:220px;
object-fit:cover;
}

.fb-content{
padding:20px;
text-align:left;
}
</style>

</head>

<body>

<div class="container">
<h1>Ficus.ee – Viigipuud Eestis</h1>

<div class="slider">
<button class="arrow arrow-left" onclick="prevSlide()">‹</button>
<button class="arrow arrow-right" onclick="nextSlide()">›</button>
<div id="slideContainer"></div>
</div>

<a class="button" href="catalogue.html">
Vaata kõiki saadaval sorte
</a>

<div class="fb-section">
<img src="images/facebook-cover.jpg">
<div class="fb-content">
<h3>Viigipuude grupp Facebookis</h3>
<p>
Liitu Eesti viigipuude kasvatajate kogukonnaga. Jagame kogemusi,
katsetame sorte ja arutame, millised viigipuud Eesti kliimas kõige paremini kasvavad.
</p>
<a class="button" href="https://www.facebook.com/groups/1096702358191767/" target="_blank">
Ava Facebooki grupp
</a>
</div>
</div>

</div>

<script>
let figs = []
let current = 0
let slideTimer

function imageExists(url){
return new Promise(resolve=>{
const img = new Image()
img.onload = () => resolve(true)
img.onerror = () => resolve(false)
img.src = url
})
}

async function loadSlides(){
const res = await fetch("figs2.json")
const data = await res.json()

for(const f of data){
if(f.images && f.images.length > 0){

// Fix path for index page
const imgPath = f.images[0].replace('../','')

const exists = await imageExists(imgPath)
if(exists){
figs.push(f)
}
}
}

if(figs.length > 0){
current = 0
showSlide()
slideTimer = setInterval(nextSlide, 6000)
}
}

function showSlide(){
const f = figs[current]
const imgPath = f.images[0].replace('../','')

document.getElementById("slideContainer").innerHTML = `
<div class="slide">
<img src="${imgPath}">
<div class="slide-content">
<h2>
${f.name}
${f.saadavus=="jah" ? '<span style="color:green;"> (saadaval!)</span>' : ''}
</h2>

<p>${f.kirjeldus || ""}</p>

<div class="info-grid">
<div><b>Varasus:</b> ${f.varasus}</div>
<div><b>Maitsev:</b> ${f.maitsev}</div>
<div><b>Suurus:</b> ${f.suurus}</div>
<div><b>Külmakindlus:</b> ${f.kulmakindlus}</div>
<div><b>Värvus:</b> ${f.varvus}</div>
<div><b>Breba:</b> ${f.breba}</div>
<div><b>Riik:</b> ${f.riik}</div>
</div>

</div>
</div>
`
}

function nextSlide(){
clearInterval(slideTimer)
current = (current + 1) % figs.length
showSlide()
slideTimer = setInterval(nextSlide, 6000)
}

function prevSlide(){
clearInterval(slideTimer)
current = (current - 1 + figs.length) % figs.length
showSlide()
slideTimer = setInterval(nextSlide, 6000)
}

loadSlides()
</script>

</body>
</html>
